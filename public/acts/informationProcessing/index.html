  <body>
    <div class="wrap">
      <div
        id="titleWrap"
        class="card"
        style="margin-bottom: 12px; display: none"
      >
        <div id="actTitle" class="title"></div>
        <div id="audioContainer" class="audioWrap"></div>
        <div id="imageContainer" class="imageWrap"></div>
      </div>

      <div id="mcqCard" class="card">
        <div class="qTitle" id="questionTitle"></div>
        <div id="qwrap" class="qwrap"></div>

        <div class="controls">
          <div class="score" id="scoreBox">Score : 0 / 0</div>
          <div style="margin-left: auto">
            <button class="btn" id="hintBtn" style="display: none">Hint</button>
            <button class="btn disabled" id="nextBtn" style="display: none">
              Next
            </button>
          </div>
        </div>
      </div>

      <div id="finalWrap" class="card" style="display: none; margin-top: 18px">
        <div class="title">You have completed this activity.</div>
        <div id="summaryList" class="summary"></div>
        <div
          style="
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 12px;
          "
        >
          <div class="small" id="finalScore"></div>
          <button class="btn" id="finalNextBtn">Next</button>
        </div>
      </div>
    </div>

    <div id="rightMark" class="mark right">✔</div>
    <div id="wrongMark" class="mark wrong">✖</div>

    <script>
      (function () {
        // read payload (query param ?payload= or window.frameElement.dataset.payload)
        function readPayload() {
          try {
            const url = new URL(location.href);
            let raw = url.searchParams.get('payload');
            if (
              !raw &&
              window.frameElement &&
              window.frameElement.dataset &&
              window.frameElement.dataset.payload
            ) {
              raw = window.frameElement.dataset.payload;
            }
            if (!raw) return null;
            // try decode twice safely
            try {
              raw = decodeURIComponent(raw);
            } catch (e) {}
            try {
              raw = decodeURIComponent(raw);
            } catch (e) {}
            return JSON.parse(raw);
          } catch (e) {
            console.error('readPayload error', e);
            return null;
          }
        }

        function parseOptionsString(raw) {
          return (raw || '')
            .split(/\n|,/)
            .map((s) => s.trim())
            .filter(Boolean);
        }

        function shuffleArray(arr) {
          const a = arr.slice();
          for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
          }
          return a;
        }

        // normalize questions: support *marked* option -> correct
        function normalizeQuestions(raw) {
          return raw.map((q) => {
            const original = q.qText || q.text || '';
            // options may be string; handle star-marked option
            const rawOpts = parseOptionsString(q.options || q.option || '');
            let originalCorrectIndex = -1;
            const cleaned = rawOpts.map((o, idx) => {
              if (o.indexOf('*') !== -1) {
                originalCorrectIndex = idx;
                return o.replace(/\*/g, '').trim();
              }
              return o;
            });
            if (originalCorrectIndex === -1) originalCorrectIndex = 0;
            // shuffle options while mapping correct index
            const indices = cleaned.map((_, i) => i);
            const shuffledIndices = shuffleArray(indices);
            const shuffledOpts = [];
            let newCorrect = -1;
            shuffledIndices.forEach((origIdx, newIdx) => {
              shuffledOpts.push(cleaned[origIdx]);
              if (origIdx === originalCorrectIndex) newCorrect = newIdx;
            });
            if (newCorrect === -1) newCorrect = 0;
            return {
              qTextRaw: original,
              qText: original, // preserve question text as-is (per your request)
              options: shuffledOpts,
              correctIndex: newCorrect,
              userChoice: null,
              answered: false,
              type: q.type || 'mcq',
            };
          });
        }

        // UI state
        const state = {
          payload: null,
          questions: [],
          current: 0,
          score: 0,
          attempted: 0,
          total: 0,
        };

        // show title + image + audio if present
        function renderTitleAndImage() {
          const titleWrap = document.getElementById('titleWrap');
          const actTitle = document.getElementById('actTitle');
          const imageContainer = document.getElementById('imageContainer');
          const audioContainer = document.getElementById('audioContainer');

          const p = state.payload && (state.payload.data || state.payload);
          if (!p) return;

          const title = p.title || p.label || '';
          const image =
            p.image ||
            (p.data && p.data.image) ||
            (p.data && p.data.bgData && p.data.bgData.bgImg) ||
            null;
          
          // Extract Audio
          const audioSrc = p.audio || (p.data && p.data.audio) || null;

          if (title || image || audioSrc) {
            titleWrap.style.display = 'block';
            actTitle.textContent = title || '';
          } else {
            titleWrap.style.display = 'none';
          }

          // Handle Audio
          audioContainer.innerHTML = '';
          if (audioSrc) {
            const audio = document.createElement('audio');
            audio.controls = true;
            audio.src = audioSrc;
            audioContainer.appendChild(audio);
          }

          // Handle Image
          imageContainer.innerHTML = '';
          if (image) {
            const img = document.createElement('img');
            img.src = image;
            img.alt = title || 'image';
            // apply bgData sizing if available
            const bg = p.bgData || (p.data && p.data.bgData);
            if (bg) {
              if (bg.width) img.style.maxWidth = bg.width + 'px';
              if (bg.height) img.style.maxHeight = bg.height + 'px';
            }
            imageContainer.appendChild(img);
          }
        }

        // MCQ rendering
        function renderQuestion() {
          const rightMarkEl = document.getElementById('rightMark');
          const wrongMarkEl = document.getElementById('wrongMark');
          rightMarkEl.style.display = 'none';
          wrongMarkEl.style.display = 'none';

          const q = state.questions[state.current];
          const wrap = document.getElementById('qwrap');
          const title = document.getElementById('questionTitle');
          const nextBtn = document.getElementById('nextBtn');

          // set top title: use activity title (already shown above) but show short heading here
          title.textContent =
            (state.payload &&
              (state.payload.data
                ? state.payload.data.title
                : state.payload.title)) ||
            '';

          wrap.innerHTML = '';

          const qDiv = document.createElement('div');
          qDiv.className = 'question';
          qDiv.innerHTML = q.qText || '';
          wrap.appendChild(qDiv);

          const optBox = document.createElement('div');
          optBox.className = 'options';

          q.options.forEach((opt, i) => {
            const li = document.createElement('div');
            li.className = 'option';
            li.dataset.index = i;

            const radio = document.createElement('span');
            radio.className = 'radio';

            const label = document.createElement('div');
            label.className = 'optLabel';
            label.textContent = opt;

            li.appendChild(radio);
            li.appendChild(label);

            li.addEventListener('click', () => {
              if (q.answered) return;
              q.answered = true;
              q.userChoice = i;
              state.attempted++;
              const isCorrect = i === q.correctIndex;
              if (isCorrect) {
                li.querySelector('.optLabel').classList.add('correct');
                state.score++;
                rightMarkEl.style.display = 'block';
              } else {
                li.querySelector('.optLabel').classList.add('wrong');
                const correctLi = optBox.querySelector(
                  `.option[data-index="${q.correctIndex}"]`
                );
                if (correctLi)
                  correctLi.querySelector('.optLabel').classList.add('correct');
                wrongMarkEl.style.display = 'block';
              }
              updateScore();
              nextBtn.disabled = false;
              nextBtn.classList.remove('disabled');
              nextBtn.style.display = 'inline-block';
            });

            optBox.appendChild(li);
          });

          wrap.appendChild(optBox);
          // hide next until answered
          nextBtn.disabled = true;
          nextBtn.style.display = 'none';
          nextBtn.classList.add('disabled');
          nextBtn.textContent =
            state.current === state.total - 1 ? 'Finish' : 'Next';
        }

        function updateScore() {
          const s = document.getElementById('scoreBox');
          s.textContent = `Score : ${state.score} / ${state.attempted}`;
        }

        function showSummary() {
          document.getElementById('mcqCard').style.display = 'none';
          document.getElementById('finalWrap').style.display = 'block';
          const sum = document.getElementById('summaryList');
          sum.innerHTML = '';
          state.questions.forEach((q, i) => {
            const d = document.createElement('div');
            d.className = 'summaryItem';
            const user =
              q.userChoice === null ? '(no answer)' : q.options[q.userChoice];
            const correct = q.options[q.correctIndex];
            d.innerHTML = `<strong>${i + 1})</strong> ${
              q.qTextRaw || q.qText || ''
            }<br>
        Answer: <span style="color:${
          q.userChoice === q.correctIndex ? 'green' : 'red'
        }">${user}</span> &nbsp; Correct: <strong>${correct}</strong>`;
            sum.appendChild(d);
          });
          document.getElementById(
            'finalScore'
          ).textContent = `Score: ${state.score} / ${state.attempted}`;
        }

        // notify parent (playlist) when finalNext clicked
        function notifyParent(payload) {
          try {
            window.parent.postMessage(
              JSON.stringify(Object.assign({ done: true }, payload || {})),
              '*'
            );
          } catch (e) {}
        }

        // init
        window.addEventListener('DOMContentLoaded', () => {
          state.payload = readPayload();
          if (!state.payload) {
            // nothing provided: show helpful message
            document.getElementById('mcqCard').innerHTML =
              '<div class="small">No payload found. Provide ?payload=... or data-payload on iframe.</div>';
            return;
          }

          // The engine supports payload in either shape:
          // payload.data.questions OR payload.questions OR payload.data (array)
          const data = state.payload.data || state.payload;
          const rawQuestions = data.questions || data;
          if (!Array.isArray(rawQuestions) || rawQuestions.length === 0) {
            document.getElementById('mcqCard').innerHTML =
              '<div class="small">No questions found in payload.</div>';
            return;
          }

          // render title/image/audio if exist
          renderTitleAndImage();

          // Normalize question set
          state.questions = normalizeQuestions(rawQuestions);
          state.total = state.questions.length;
          state.current = 0;
          state.score = 0;
          state.attempted = 0;

          updateScore();
          renderQuestion();

          // next button
          const nextBtn = document.getElementById('nextBtn');
          nextBtn.addEventListener('click', () => {
            if (state.current + 1 < state.total) {
              state.current++;
              renderQuestion();
            } else {
              showSummary();
            }
          });

          document
            .getElementById('finalNextBtn')
            .addEventListener('click', () => {
              notifyParent({ score: state.score, total: state.attempted });
            });
        });
      })();
    </script>
  </body>
</html>

        <div id="actTitle" class="title"></div>

        <div id="imageContainer" class="imageWrap"></div>
      </div>

      <div id="mcqCard" class="card">

        <div class="controls">

        </div>

      <div id="finalWrap" class="card" style="display: none; margin-top: 18px">
        <div class="title">You have completed this activity.</div>
        <div id="summaryList" class="summary"></div>

          style="

    <script>
      (function () {
        // read payload (query param ?payload= or window.frameElement.dataset.payload)
        function readPayload() {
          try {
            const url = new URL(location.href);
            let raw = url.searchParams.get('payload');
            if (
              !raw &&
              window.frameElement &&
              window.frameElement.dataset &&
              window.frameElement.dataset.payload
            ) {
              raw = window.frameElement.dataset.payload;
            }
            if (!raw) return null;
            // try decode twice safely
            try {
              raw = decodeURIComponent(raw);
            } catch (e) {}
            try {
              raw = decodeURIComponent(raw);
            } catch (e) {}
            return JSON.parse(raw);
          } catch (e) {
            console.error('readPayload error', e);
            return null;
          }
        }

        function parseOptionsString(raw) {
          return (raw || '')
            .split(/\n|,/)
            .map((s) => s.trim())
            .filter(Boolean);
        }

        function shuffleArray(arr) {
          const a = arr.slice();
          for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
          }
          return a;
        }

        // normalize questions: support *marked* option -> correct
        function normalizeQuestions(raw) {
          return raw.map((q) => {
            const original = q.qText || q.text || '';
            // options may be string; handle star-marked option
            const rawOpts = parseOptionsString(q.options || q.option || '');
            let originalCorrectIndex = -1;
            const cleaned = rawOpts.map((o, idx) => {
              if (o.indexOf('*') !== -1) {
                originalCorrectIndex = idx;
                return o.replace(/\*/g, '').trim();
              }
              return o;
            });
            if (originalCorrectIndex === -1) originalCorrectIndex = 0;
            // shuffle options while mapping correct index
            const indices = cleaned.map((_, i) => i);
            const shuffledIndices = shuffleArray(indices);
            const shuffledOpts = [];
            let newCorrect = -1;
            shuffledIndices.forEach((origIdx, newIdx) => {
              shuffledOpts.push(cleaned[origIdx]);
              if (origIdx === originalCorrectIndex) newCorrect = newIdx;
            });
            if (newCorrect === -1) newCorrect = 0;
            return {
              qTextRaw: original,
              qText: original, // preserve question text as-is (per your request)
              options: shuffledOpts,
              correctIndex: newCorrect,
              userChoice: null,
              answered: false,
              type: q.type || 'mcq',
            };
          });
        }

        // UI state
        const state = {
          payload: null,
          questions: [],
          current: 0,
          score: 0,
          attempted: 0,
          total: 0,
        };

        // Create a custom audio player
        function createCustomAudioPlayer(audioSrc) {
          const container = document.createElement('div');
          container.className = 'custom-audio-player';

          const audio = document.createElement('audio');
          audio.src = audioSrc;
          audio.style.display = 'none'; // Hide the default player

          const playBtn = document.createElement('button');
          playBtn.className = 'play-pause-btn';
          playBtn.innerHTML = '▶'; // Play icon

          const seekBarContainer = document.createElement('div');
          seekBarContainer.className = 'seek-bar-container';

          const seekBar = document.createElement('input');
          seekBar.type = 'range';
          seekBar.className = 'seek-bar';
          seekBar.value = 0;
          seekBar.max = 100;

          const seekFill = document.createElement('div');
          seekFill.className = 'seek-fill';

          seekBarContainer.appendChild(seekFill);
          seekBarContainer.appendChild(seekBar);

          const timeDisplay = document.createElement('span');
          timeDisplay.className = 'time-display';
          timeDisplay.textContent = '0:00 / 0:00';

          container.appendChild(audio);
          container.appendChild(playBtn);
          container.appendChild(seekBarContainer);
          container.appendChild(timeDisplay);

          // Audio Controls Logic
          playBtn.addEventListener('click', () => {
            if (audio.paused) {
              audio.play();
              playBtn.innerHTML = '❚❚'; // Pause icon
            } else {
              audio.pause();
              playBtn.innerHTML = '▶'; // Play icon
            }
          });

          audio.addEventListener('timeupdate', () => {
            const value = (audio.currentTime / audio.duration) * 100;
            seekBar.value = value || 0;
            seekFill.style.width = `${value || 0}%`;
            
            const current = formatTime(audio.currentTime);
            const duration = formatTime(audio.duration);
            timeDisplay.textContent = `${current} / ${duration}`;
          });

          seekBar.addEventListener('input', () => {
            const time = (seekBar.value / 100) * audio.duration;
            audio.currentTime = time;
          });

          audio.addEventListener('loadedmetadata', () => {
            timeDisplay.textContent = `0:00 / ${formatTime(audio.duration)}`;
          });

          audio.addEventListener('ended', () => {
            playBtn.innerHTML = '▶';
            seekBar.value = 0;
            seekFill.style.width = '0%';
          });

          return container;
        }

        function formatTime(seconds) {
          if (isNaN(seconds)) return '0:00';
          const m = Math.floor(seconds / 60);
          const s = Math.floor(seconds % 60);
          return `${m}:${s < 10 ? '0' : ''}${s}`;
        }


        // show title + image + audio if present
        function renderTitleAndImage() {
          const titleWrap = document.getElementById('titleWrap');
          const actTitle = document.getElementById('actTitle');
          const imageContainer = document.getElementById('imageContainer');
          const audioContainer = document.getElementById('audioContainer');

          const p = state.payload && (state.payload.data || state.payload);
          if (!p) return;

          const title = p.title || p.label || '';
          const image =
            p.image ||
            (p.data && p.data.image) ||
            (p.data && p.data.bgData && p.data.bgData.bgImg) ||
            null;
          
          // Extract Audio
          const audioSrc = p.audio || (p.data && p.data.audio) || null;

          if (title || image || audioSrc) {
            titleWrap.style.display = 'block';
            actTitle.textContent = title || '';
          } else {
            titleWrap.style.display = 'none';
          }

          // Handle Audio with Custom Player
          audioContainer.innerHTML = '';
          if (audioSrc) {
            const customPlayer = createCustomAudioPlayer(audioSrc);
            audioContainer.appendChild(customPlayer);
          }

          // Handle Image (Background Graphic)
          imageContainer.innerHTML = '';
          if (image) {
            const img = document.createElement('img');
            img.src = image;
            img.alt = title || 'background graphic';
            // apply bgData sizing if available
            const bg = p.bgData || (p.data && p.data.bgData);
            if (bg) {
              if (bg.width) img.style.maxWidth = bg.width + 'px';
              if (bg.height) img.style.maxHeight = bg.height + 'px';
            }
            imageContainer.appendChild(img);
          }
        }

        // MCQ rendering
        function renderQuestion() {
          const rightMarkEl = document.getElementById('rightMark');
          const wrongMarkEl = document.getElementById('wrongMark');
          rightMarkEl.style.display = 'none';
          wrongMarkEl.style.display = 'none';

          const q = state.questions[state.current];
          const wrap = document.getElementById('qwrap');
          const title = document.getElementById('questionTitle');
          const nextBtn = document.getElementById('nextBtn');

          // set top title: use activity title (already shown above) but show short heading here
          title.textContent =
            (state.payload &&
              (state.payload.data
                ? state.payload.data.title
                : state.payload.title)) ||
            '';

          wrap.innerHTML = '';

          const qDiv = document.createElement('div');
          qDiv.className = 'question';
          qDiv.innerHTML = q.qText || '';
          wrap.appendChild(qDiv);

          const optBox = document.createElement('div');
          optBox.className = 'options';

          q.options.forEach((opt, i) => {
            const li = document.createElement('div');
            li.className = 'option';
            li.dataset.index = i;

            const radio = document.createElement('span');
            radio.className = 'radio';

            const label = document.createElement('div');
            label.className = 'optLabel';
            label.textContent = opt;

            li.appendChild(radio);
            li.appendChild(label);

            li.addEventListener('click', () => {
              if (q.answered) return;
              q.answered = true;
              q.userChoice = i;
              state.attempted++;
              const isCorrect = i === q.correctIndex;
              if (isCorrect) {
                li.querySelector('.optLabel').classList.add('correct');
                state.score++;
                rightMarkEl.style.display = 'block';
              } else {
                li.querySelector('.optLabel').classList.add('wrong');
                const correctLi = optBox.querySelector(
                  `.option[data-index="${q.correctIndex}"]`
                );
                if (correctLi)
                  correctLi.querySelector('.optLabel').classList.add('correct');
                wrongMarkEl.style.display = 'block';
              }
              updateScore();
              nextBtn.disabled = false;
              nextBtn.classList.remove('disabled');
              nextBtn.style.display = 'inline-block';
            });

            optBox.appendChild(li);
          });

          wrap.appendChild(optBox);
          // hide next until answered
          nextBtn.disabled = true;
          nextBtn.style.display = 'none';
          nextBtn.classList.add('disabled');
          nextBtn.textContent =
            state.current === state.total - 1 ? 'Finish' : 'Next';
        }

        function updateScore() {
          const s = document.getElementById('scoreBox');
          s.textContent = `Score : ${state.score} / ${state.attempted}`;
        }

        function showSummary() {
          document.getElementById('mcqCard').style.display = 'none';
          document.getElementById('finalWrap').style.display = 'block';
          const sum = document.getElementById('summaryList');
          sum.innerHTML = '';
          state.questions.forEach((q, i) => {
            const d = document.createElement('div');
            d.className = 'summaryItem';
            const user =
              q.userChoice === null ? '(no answer)' : q.options[q.userChoice];
            const correct = q.options[q.correctIndex];
            d.innerHTML = `<strong>${i + 1})</strong> ${
              q.qTextRaw || q.qText || ''
            }<br>
        Answer: <span style="color:${
          q.userChoice === q.correctIndex ? 'green' : 'red'
        }">${user}</span> &nbsp; Correct: <strong>${correct}</strong>`;
            sum.appendChild(d);
          });
          document.getElementById(
            'finalScore'
          ).textContent = `Score: ${state.score} / ${state.attempted}`;
        }

        // notify parent (playlist) when finalNext clicked
        function notifyParent(payload) {
          try {
            window.parent.postMessage(
              JSON.stringify(Object.assign({ done: true }, payload || {})),
              '*'
            );
          } catch (e) {}
        }

        // init
        window.addEventListener('DOMContentLoaded', () => {
          state.payload = readPayload();
          if (!state.payload) {
            // nothing provided: show helpful message
            document.getElementById('mcqCard').innerHTML =
              '<div class="small">No payload found. Provide ?payload=... or data-payload on iframe.</div>';
            return;
          }

          // The engine supports payload in either shape:
          // payload.data.questions OR payload.questions OR payload.data (array)
          const data = state.payload.data || state.payload;
          const rawQuestions = data.questions || data;
          if (!Array.isArray(rawQuestions) || rawQuestions.length === 0) {
            document.getElementById('mcqCard').innerHTML =
              '<div class="small">No questions found in payload.</div>';
            return;
          }

          // render title/image/audio if exist
          renderTitleAndImage();

          // Normalize question set
          state.questions = normalizeQuestions(rawQuestions);
          state.total = state.questions.length;
          state.current = 0;
          state.score = 0;
          state.attempted = 0;

          updateScore();
          renderQuestion();

          // next button
          const nextBtn = document.getElementById('nextBtn');
          nextBtn.addEventListener('click', () => {
            if (state.current + 1 < state.total) {
              state.current++;
              renderQuestion();
            } else {
              showSummary();
            }
          });

          document
            .getElementById('finalNextBtn')
            .addEventListener('click', () => {
              notifyParent({ score: state.score, total: state.attempted });
            });
        });
      })();
    </script>
